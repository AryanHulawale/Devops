# =============================================================================
# Docker Build & Push — GitHub Actions Workflow
# Builds a multi-platform Docker image and pushes to Docker Hub.
# Triggered on pushes to master or manually via workflow_dispatch.
# =============================================================================

name: Docker Build & Push

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Setup Docker Buildx for multi-platform builds
      # -----------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for multi-platform emulation)
        uses: docker/setup-qemu-action@v3

      # -----------------------------------------------------------------
      # Authenticate with Docker Hub
      # -----------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------------------------------------------------
      # Extract metadata for tags and labels
      # -----------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/devops-implementation
          tags: |
            # Tag with branch name
            type=ref,event=branch
            # Tag with full commit SHA
            type=sha,format=long
            # Tag as 'latest' on master branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with timestamp: prod-YYYYMMDD-HHmmss
            type=raw,value=prod-{{date 'YYYYMMDD-HHmmss'}}

      # -----------------------------------------------------------------
      # Build and push multi-platform image
      # -----------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------
      # GitHub summary
      # -----------------------------------------------------------------
      - name: Generate summary
        run: |
          echo "## 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ secrets.DOCKER_USERNAME }}/devops-implementation\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷 Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | while read tag; do
            echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
